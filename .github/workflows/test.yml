name: test
# Auto-managed by ~/.local/bin/gh-harden-repos.sh. Do not hand-edit.
# Minimal pytest gate for Python MCP servers. Allows Layer 5
# dependabot-auto-merge to wait on a real check.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          # Install the package (validates imports/build), the repo's own
          # test extra if it declares one, then pytest + pytest-asyncio so
          # async MCP-server tests run regardless of how the repo declares
          # its test dependencies.
          pip install -e ".[test]" || pip install -e ".[dev]" || pip install -e . || pip install .
          pip install pytest pytest-asyncio
      - name: Run tests
        run: |
          set +e
          pytest tests/ -v
          code=$?
          set -e
          # Exit 5 = no tests collected (tests/ holds only credential-gated
          # integration smoke scripts with no pytest functions). Tolerate it;
          # the install step above already validated the package imports.
          [ "$code" = "0" ] || [ "$code" = "5" ]